name: Update Upstream Skills

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:       # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Update upstream skills
        run: bun update-skills.mjs --all

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain shared/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --stat shared/
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes"
          fi

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update upstream skills'
          title: 'chore: weekly upstream skill update'
          body: |
            Automated weekly update of upstream skills from 12 source repos.

            Run `bun sync.mjs --all` after merging to push updates to projects.
          branch: chore/update-upstream-skills
          delete-branch: true
